# ============================================================
# PREMIUM WEBSITE — CI/CD PIPELINE
# Place at: .github/workflows/ci-cd.yml
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}

jobs:
  # ============================================================
  # 1. CODE QUALITY — Lint + Type Check
  # ============================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0

      - name: Prettier Check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,css,md,json}"

  # ============================================================
  # 2. SECURITY — Dependency audit + secrets scan
  # ============================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: NPM Audit (High + Critical)
        run: npm audit --audit-level=high
        continue-on-error: true  # Change to false for strict mode

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ============================================================
  # 3. TESTING — Unit + Integration + E2E
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Unit & Integration Tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================================
  # 4. ACCESSIBILITY — Automated a11y checks
  # ============================================================
  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true

  # ============================================================
  # 5. BUILD — Production build check
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build Production
        run: npm run build

      - name: Check bundle size
        run: |
          echo "--- Bundle Analysis ---"
          du -sh .next/static/chunks/*.js | sort -rh | head -20
          echo "--- Total Size ---"
          du -sh .next/

  # ============================================================
  # 6. DEPLOY — Auto-deploy on main (Vercel example)
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, security, accessibility]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      # --- Post-deploy checks ---
      - name: Verify deployment
        run: |
          sleep 30
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ secrets.SITE_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "Deployment verification failed! HTTP $STATUS"
            exit 1
          fi
          echo "Deployment verified: HTTP $STATUS"
