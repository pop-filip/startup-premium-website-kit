<section class="hero">
  <div class="hero-bg">
    <picture>
      <source srcset="/images/hero.webp" type="image/webp">
      <img src="/images/hero.jpg" alt="{{BUSINESS_NAME}}">
    </picture>
    <div class="hero-overlay"></div>
  </div>
  <div class="hero-inner">
    <div class="hero-eyebrow">{{TAGLINE}}</div>
    <h1 class="hero-title">{{TITLE}}</h1>
    <div class="hero-line"></div>
    <p class="hero-subtitle">{{SUBTITLE}}</p>
    <a href="{{CTA_URL}}" class="btn-primary">{{CTA_TEXT}}</a>
  </div>
</section>

<style>
.hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; z-index: 0; }
.hero-bg img { width: 100%; height: 100%; object-fit: cover; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(10,10,10,0.92) 40%, rgba(10,10,10,0.6)); }
.hero-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 120px 24px 80px; max-width: 680px; margin-left: 10vw; }
.hero-eyebrow { font-size: 10px; font-weight: 400; letter-spacing: 5px; text-transform: uppercase; color: var(--primary); margin-bottom: 32px; }
.hero-title { font-size: clamp(42px, 6vw, 80px); font-weight: 300; line-height: 1.1; margin: 0 0 32px; color: var(--text); font-style: italic; }
.hero-line { width: 60px; height: 1px; background: var(--primary); margin-bottom: 28px; }
.hero-subtitle { font-size: 15px; line-height: 1.8; color: rgba(245,240,232,0.6); margin: 0 0 48px; max-width: 440px; font-weight: 300; letter-spacing: 0.5px; }
.btn-primary { display: inline-flex; align-items: center; gap: 12px; background: transparent; color: var(--primary); font-size: 11px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; padding: 16px 32px; border: 1px solid rgba(201,169,110,0.5); text-decoration: none; transition: background 0.3s, border-color 0.3s; }
.btn-primary::after { content: '→'; font-size: 14px; letter-spacing: 0; }
.btn-primary:hover { background: rgba(201,169,110,0.1); border-color: var(--primary); }
@media (max-width: 768px) {
  .hero-inner { margin-left: 0; padding: 100px 24px 60px; }
}
</style>
