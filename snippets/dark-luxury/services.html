<section class="services">
  <div class="services-inner">
    <div class="section-header">
      <p class="section-eyebrow">{{TAGLINE}}</p>
      <h2 class="section-title">{{SECTION_TITLE}}</h2>
    </div>
    <div class="services-grid">
      <!-- Repeat per service -->
      <div class="service-card">
        <div class="card-icon">◆</div>
        <h3>{{SERVICE_NAME}}</h3>
        <p>{{SERVICE_DESC}}</p>
        <span class="card-price">{{SERVICE_PRICE}}</span>
      </div>
    </div>
  </div>
</section>

<style>
.services { background: var(--bg); padding: 100px 0; }
.services-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.section-eyebrow { font-size: 10px; font-weight: 400; letter-spacing: 5px; text-transform: uppercase; color: var(--primary); margin: 0 0 16px; }
.section-title { font-size: clamp(28px, 4vw, 48px); font-weight: 300; font-style: italic; margin: 0 0 60px; }
.services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1px; background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.15); }
.service-card { background: var(--surface); padding: 40px 32px; transition: background 0.3s; }
.service-card:hover { background: rgba(201,169,110,0.05); }
.card-icon { color: var(--primary); font-size: 16px; margin-bottom: 20px; opacity: 0.7; }
.service-card h3 { font-size: 18px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 0 0 14px; }
.service-card p { font-size: 14px; line-height: 1.75; color: rgba(245,240,232,0.55); margin: 0 0 20px; }
.card-price { font-size: 12px; color: var(--primary); letter-spacing: 2px; }
</style>
