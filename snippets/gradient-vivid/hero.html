<section class="hero">
  <div class="hero-inner">
    <div class="hero-chip">{{TAGLINE}}</div>
    <h1 class="hero-title">{{TITLE}}</h1>
    <p class="hero-subtitle">{{SUBTITLE}}</p>
    <div class="hero-actions">
      <a href="{{CTA_URL}}" class="btn-primary">{{CTA_TEXT}}</a>
      <a href="tel:{{PHONE}}" class="btn-ghost">{{PHONE}}</a>
    </div>
    <div class="hero-stats">
      <div class="stat"><strong>{{STAT_NUMBER}}</strong><span>{{STAT_LABEL}}</span></div>
    </div>
  </div>
  <div class="hero-visual">
    <div class="hero-glow"></div>
    <div class="hero-card-float">
      <picture>
        <source srcset="/images/hero.webp" type="image/webp">
        <img src="/images/hero.jpg" alt="{{BUSINESS_NAME}}">
      </picture>
    </div>
  </div>
</section>

<style>
.hero { background: var(--bg); min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1), rgba(236,72,153,0.1)); pointer-events: none; }
.hero-inner { flex: 1; max-width: 600px; padding: 100px 24px 60px 8vw; position: relative; z-index: 1; }
.hero-chip { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #A5B4FC; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 6px 16px; border-radius: 100px; margin-bottom: 24px; }
.hero-chip::before { content: ''; width: 6px; height: 6px; background: #6366F1; border-radius: 50%; }
.hero-title { font-size: clamp(38px, 5.5vw, 72px); font-weight: 800; line-height: 1.08; margin: 0 0 20px; background: linear-gradient(135deg, #fff 20%, #A78BFA 60%, #F472B6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-subtitle { font-size: 16px; line-height: 1.7; color: rgba(255,255,255,0.65); margin: 0 0 36px; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 48px; }
.btn-primary { display: inline-flex; align-items: center; background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; font-weight: 700; font-size: 14px; padding: 14px 28px; border-radius: 12px; text-decoration: none; transition: opacity 0.2s, transform 0.2s; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
.btn-ghost { display: inline-flex; align-items: center; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); font-weight: 600; font-size: 14px; padding: 14px 28px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); text-decoration: none; }
.hero-stats { display: flex; gap: 32px; }
.hero-stats .stat { display: flex; flex-direction: column; }
.hero-stats strong { font-size: 28px; font-weight: 800; color: #FACC15; }
.hero-stats span { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.hero-visual { flex: 1; position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.hero-glow { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(139,92,246,0.5), transparent 70%); border-radius: 50%; }
.hero-card-float { position: relative; z-index: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08); }
.hero-card-float img { width: 360px; aspect-ratio: 4/5; object-fit: cover; display: block; }
@media (max-width: 768px) {
  .hero { flex-direction: column; }
  .hero-visual { display: none; }
  .hero-inner { padding: 100px 24px 60px; }
}
</style>
