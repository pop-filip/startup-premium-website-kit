<section class="services">
  <div class="services-inner">
    <div class="section-chip">{{TAGLINE}}</div>
    <h2 class="section-title">{{SECTION_TITLE}}</h2>
    <p class="section-sub">{{SECTION_SUBTITLE}}</p>
    <div class="services-grid">
      <div class="service-card">
        <div class="card-glow"></div>
        <div class="card-icon">{{ICON}}</div>
        <h3>{{SERVICE_NAME}}</h3>
        <p>{{SERVICE_DESC}}</p>
        <span class="card-price">{{SERVICE_PRICE}}</span>
      </div>
    </div>
  </div>
</section>
<style>
.services { padding: 80px 0; }
.services-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.section-chip { display: inline-block; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #A5B4FC; font-size: 12px; font-weight: 600; padding: 5px 16px; border-radius: 100px; margin-bottom: 16px; }
.section-title { font-size: clamp(28px, 4vw, 52px); font-weight: 800; margin: 0 0 12px; background: linear-gradient(135deg, #fff, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.section-sub { color: rgba(255,255,255,0.55); margin: 0 0 48px; font-size: 15px; }
.services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
.service-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; position: relative; overflow: hidden; transition: border-color 0.3s; }
.service-card:hover { border-color: rgba(167,139,250,0.4); }
.card-glow { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #6366F1, #A78BFA, #F472B6); }
.card-icon { font-size: 28px; margin-bottom: 14px; }
.service-card h3 { font-size: 18px; font-weight: 700; margin: 0 0 10px; }
.service-card p { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.55); margin: 0 0 14px; }
.card-price { font-size: 13px; color: #FACC15; font-weight: 700; }
</style>
