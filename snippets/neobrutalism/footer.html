<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand"><div class="footer-logo">{{BUSINESS_NAME}}</div><p>{{TAGLINE}}</p></div>
    <div class="footer-info">
      <p>{{ADDRESS}}</p>
      <a href="tel:{{PHONE}}">{{PHONE}}</a>
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <p>{{HOURS}}</p>
    </div>
  </div>
  <div class="footer-bottom"><span>© {{YEAR}} {{BUSINESS_NAME}}</span><a href="/datenschutz">Datenschutz</a><a href="/impressum">Impressum</a></div>
</footer>

.footer { background: var(--text); color: var(--bg); padding: 60px 0 0; border-top: 2px solid var(--text); }

.footer-logo { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.footer-brand p { font-size: 13px; opacity: 0.5; }

.footer-info a:hover { color: var(--primary); }
.footer-bottom { max-width: 1200px; margin: 0 auto; padding: 20px 24px; display: flex; gap: 24px; font-size: 12px; color: rgba(255,255,255,0.3); }
.footer-bottom a { color: rgba(255,255,255,0.3); text-decoration: none; }
</style>
