<section class="hero">
  <div class="hero-inner">
    <div class="hero-ornament">✦ ✦ ✦</div>
    <p class="hero-label">{{TAGLINE}}</p>
    <h1 class="hero-title">{{TITLE}}</h1>
    <div class="hero-divider"><span>— —</span></div>
    <p class="hero-subtitle">{{SUBTITLE}}</p>
    <a href="{{CTA_URL}}" class="btn-primary">{{CTA_TEXT}}</a>
    <p class="hero-phone">{{PHONE}}</p>
  </div>
  <div class="hero-img-strip">
    <picture>
      <source srcset="/images/hero.webp" type="image/webp">
      <img src="/images/hero.jpg" alt="{{BUSINESS_NAME}}">
    </picture>
  </div>
</section>

<style>
.hero { background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; min-height: 85vh; }
.hero-inner { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 80px 60px 60px; border-right: 1px dashed rgba(44,26,14,0.2); }
.hero-ornament { color: var(--primary); letter-spacing: 8px; font-size: 14px; margin-bottom: 20px; }
.hero-label { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--primary); margin: 0 0 20px; }
.hero-title { font-size: clamp(38px, 5vw, 68px); font-weight: 700; font-style: italic; line-height: 1.15; margin: 0 0 24px; color: var(--text); }
.hero-divider { color: var(--primary); letter-spacing: 6px; margin-bottom: 20px; }
.hero-subtitle { font-size: 15px; line-height: 1.8; color: rgba(44,26,14,0.7); margin: 0 0 36px; max-width: 380px; }
.btn-primary { display: inline-flex; align-items: center; background: var(--primary); color: #fff; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 15px; padding: 14px 32px; border: 2px double rgba(255,255,255,0.4); text-decoration: none; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.88; }
.hero-phone { font-size: 13px; color: rgba(44,26,14,0.5); margin-top: 16px; letter-spacing: 1px; }
.hero-img-strip img { width: 100%; height: 100%; object-fit: cover; filter: sepia(25%) saturate(0.9); display: block; }
@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-img-strip { display: none; }
  .hero-inner { padding: 80px 24px 60px; }
}
</style>
