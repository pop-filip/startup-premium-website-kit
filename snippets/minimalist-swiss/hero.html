<section class="hero">
  <div class="hero-inner">
    <div class="hero-grid-num">01</div>
    <div class="hero-content">
      <p class="hero-label">{{TAGLINE}}</p>
      <h1 class="hero-title">{{TITLE}}</h1>
      <p class="hero-subtitle">{{SUBTITLE}}</p>
      <div class="hero-actions">
        <a href="{{CTA_URL}}" class="btn-primary">{{CTA_TEXT}}</a>
        <a href="tel:{{PHONE}}" class="hero-phone">{{PHONE}}</a>
      </div>
    </div>
    <div class="hero-img-col">
      <picture>
        <source srcset="/images/hero.webp" type="image/webp">
        <img src="/images/hero.jpg" alt="{{BUSINESS_NAME}}">
      </picture>
    </div>
  </div>
</section>

<style>
.hero { background: var(--bg); padding: 120px 0 80px; border-bottom: 1px solid #E0E0E0; }
.hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 40px 1fr 1fr; gap: 48px; align-items: start; }
.hero-grid-num { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #C0C0C0; padding-top: 8px; }
.hero-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #999; margin: 0 0 24px; }
.hero-title { font-size: clamp(36px, 5vw, 64px); font-weight: 700; line-height: 1.05; letter-spacing: -2px; margin: 0 0 24px; }
.hero-subtitle { font-size: 16px; line-height: 1.7; color: #555; margin: 0 0 40px; max-width: 400px; }
.hero-actions { display: flex; align-items: center; gap: 32px; }
.btn-primary { display: inline-flex; align-items: center; background: var(--text); color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 1px; padding: 14px 28px; text-decoration: none; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.8; }
.hero-phone { font-size: 14px; color: #555; text-decoration: none; border-bottom: 1px solid #E0E0E0; padding-bottom: 2px; }
.hero-img-col img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
@media (max-width: 768px) {
  .hero-inner { grid-template-columns: 1fr; }
  .hero-grid-num { display: none; }
  .hero-img-col { display: none; }
}
</style>
